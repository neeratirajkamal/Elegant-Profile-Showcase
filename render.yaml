services:
  - type: web
    name: elegant-profile-showcase
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=86400
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=86400
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
