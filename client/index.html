<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Favicon — all required sizes -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts with display=swap for CLS fix -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics 4 — SPA-safe (send_page_view: false → fired manually on route change) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BQE8PSN8R3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BQE8PSN8R3', {
        send_page_view: false,
        anonymize_ip: true
      });
    </script>

    <!-- Fallback title / meta — overridden per-page by react-helmet-async -->
    <title>Raj Kamal Neerati — AI &amp; Automation Developer | Hyderabad</title>
    <meta name="description" content="Hire Raj Kamal Neerati — AI &amp; Automation Developer from Hyderabad. Specializing in AI workflow automation, prompt engineering, and no-code AI systems." />
    <link rel="canonical" href="https://elegant-profile-showcase.onrender.com/" />

    <!-- Performance: preload the above-the-fold font variant -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/outfit/v11/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1C4G-EiAou6Y.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
